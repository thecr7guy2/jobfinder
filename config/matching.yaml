  min_keyword_hits: 2
  llm_score_threshold: 70
  llm:
    provider: deepseek
    api_style: openai_compatible
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    model: deepseek-chat
    response_format: json_object
    temperature: 0.1
    timeout_seconds: 60
    max_output_tokens: 180

    - GenAI Lead
    - ML Lead
  preferred_locations: []
  allow_remote: true
  remote_markers:
    - remote
    - remotely
    - hybrid
    - work from home
    - home-based
  keyword_terms:
    - python
    - machine learning
    - data science
    - llm
    - genai
    - nlp
    - sql
    - spark
    - databricks
    - mlops
    - docker
    - kubernetes
    - azure
    - artificial intelligence
    - large language models
    - agentic
    - rag
    - retrieval augmented generation
    - prompt engineering
    - transformers
    - pytorch
    - tensorflow

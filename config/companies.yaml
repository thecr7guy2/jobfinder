companies:
  - id: booking_com
    name: Booking.com
    type: icims
    api_url: https://jobs.booking.com/api/jobs
    job_url_template: https://jobs.booking.com/booking/jobs/{slug}?lang=en-us
    ttl_hours: 6
    filters:
      location: Netherlands
      woe: "12"
      regionCode: NL
      stretchUnit: MILES
      stretch: "25"
      categories: "Data Science & Analytics|ML Engineering|ML Science"

  - id: tno
    name: TNO
    type: html
    url: https://www.tno.nl/en/careers/vacancies/
    ttl_hours: 6
    filters:
      zoeken_term: ""
      "Zoe_Selected_facet:Careers Ervaring": "829"
      "Zoe_Selected_facet:Careers Opleidingsniveau": "647"
      "Zoe_Selected_facet:Careers Vakgebied": "759"
    selectors:
      job_card: "div.ipx-pt-vacancy"
      title: "h3"
      link: "a"
      location: "dd.extra-werklocatie"

  - id: adyen
    name: Adyen
    type: greenhouse
    api_url: https://boards-api.greenhouse.io/v1/boards/adyen
    ttl_hours: 6
    filters:
      location: Amsterdam
      team:
        - Data Analytics
        - Development
        - NextGen

  - id: abn_amro
    name: ABN AMRO
    type: abn_amro
    api_url: https://www.werkenbijabnamro.nl/en/api/vacancy/
    job_url_template: https://www.werkenbijabnamro.nl/en/vacancy/{id}/{slug}
    ttl_hours: 6
    filters:
      sort: created
      sortDir: DESC
      "filters[Department]": Data & Analytics
      "filters[Country][]":
        - Netherlands
      "filters[Workexperience][]":
        - 2+ years
        - 5+ years

  - id: ing
    name: ING
    type: ing
    api_url: https://careers.ing.com/en/search-jobs/resultspost
    ttl_hours: 6
    filters:
      facet_filters:
        - id: "2750405"
          facet_type: 2
          display: Netherlands
        - id: "32178240"
          facet_type: 1
          display: Data Science

  - id: albert_heijn
    name: Albert Heijn
    type: albert_heijn
    careers_url: https://werk.ah.nl/en/vacancies/contract-type/fulltime/department-1/data-science-1
    api_url: https://werk.ah.nl/en/api/vacancy/
    job_url_template: https://werk.ah.nl/en/vacancy/{id}/{slug}
    ttl_hours: 6
    filters:
      "filters[Contract Type][]":
        - Fulltime
      "filters[Department][]":
        - Data science

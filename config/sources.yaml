sources:
  - id: booking_com
    name: Booking.com
    careers_url: https://jobs.booking.com/booking/jobs
    status: active
    extraction_method: api
    scraper_type: icims
    runtime_config: config/companies.yaml
    last_verified: 2026-04-03
    notes:
      - Public iCIMS API works at https://jobs.booking.com/api/jobs
      - Runtime filters use Netherlands plus ML/Data categories
      - No browser automation required

  - id: tno
    name: TNO
    careers_url: https://www.tno.nl/en/careers/vacancies/
    status: active
    extraction_method: html
    scraper_type: html
    runtime_config: config/companies.yaml
    last_verified: 2026-04-03
    notes:
      - Listings and detail pages are server-rendered HTML
      - Runtime filters come from the exact vacancy URL query params
      - No browser automation required

  - id: asml
    name: ASML
    careers_url: https://www.asml.com/en/careers/find-your-job
    status: skipped
    extraction_method: unknown
    scraper_type: none
    runtime_config: null
    last_verified: 2026-04-03
    notes:
      - Search page is a Next.js shell
      - Static HTML did not expose usable listing results
      - We are intentionally skipping Playwright
    blocker: No confirmed non-browser listing endpoint

  - id: adyen
    name: Adyen
    careers_url: https://careers.adyen.com/vacancies
    status: active
    extraction_method: api
    scraper_type: greenhouse
    runtime_config: config/companies.yaml
    last_verified: 2026-04-03
    notes:
      - Public Greenhouse Boards API works at https://boards-api.greenhouse.io/v1/boards/adyen/jobs?content=true
      - Runtime filters use Amsterdam plus Data Analytics, Development, and NextGen
      - No browser automation required

  - id: abn_amro
    name: ABN AMRO
    careers_url: https://www.werkenbijabnamro.nl/en/vacancies/department/data-analytics/country/netherlands/workexperience/5-10-years
    status: active
    extraction_method: api
    scraper_type: abn_amro
    runtime_config: config/companies.yaml
    last_verified: 2026-04-03
    notes:
      - Public vacancy API works at https://www.werkenbijabnamro.nl/en/api/vacancy/
      - Verified runtime filters combine Department=Data & Analytics, Country=Netherlands, and Workexperience=2+ years plus 5+ years
      - Vacancy detail pages expose JobPosting JSON-LD for description and posted date

  - id: ing
    name: ING
    careers_url: https://careers.ing.com/en/search-jobs
    status: active
    extraction_method: api
    scraper_type: ing
    runtime_config: config/companies.yaml
    last_verified: 2026-04-03
    notes:
      - Search page exposes Radancy search endpoints at https://careers.ing.com/en/search-jobs/results and https://careers.ing.com/en/search-jobs/resultspost
      - Runtime filters use Country=Netherlands and Expertise=Data Science
      - Job detail pages are server-rendered and expose JobPosting JSON-LD

  - id: albert_heijn
    name: Albert Heijn
    careers_url: https://werk.ah.nl/en/vacancies/contract-type/fulltime/department-1/data-science-1
    status: active
    extraction_method: api
    scraper_type: albert_heijn
    runtime_config: config/companies.yaml
    last_verified: 2026-04-03
    notes:
      - Public vacancy JSON works at https://werk.ah.nl/en/api/vacancy/ when requested with X-Requested-With: XMLHttpRequest
      - Verified runtime filters are Contract Type=Fulltime and Department=Data science from the provided vacancies URL
      - Vacancy detail pages are server-rendered and expose JobPosting JSON-LD for description and posted date

  - id: uber
    name: Uber
    careers_url: https://www.uber.com/nl/en/careers/list/?department=Data%20Science&location=NLD--Amsterdam
    status: skipped
    extraction_method: unknown
    scraper_type: none
    runtime_config: null
    last_verified: 2026-04-03
    notes:
      - The provided Amsterdam plus Data Science search page renders the selected filters in HTML but the results area is only a client-side CCBJobsList container with a loading spinner
      - The source HTML and decoded Redux state expose filter props and a default query shape, but do not expose actual job cards, job detail URLs, or a confirmed search endpoint
      - On 2026-04-03 the rendered page text reported no results for the exact provided filter combination
    blocker: No confirmed non-browser search endpoint for the client-hydrated jobs list

name: Cover Letter PDF

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID whose stored cover letter should be compiled to PDF
        required: true
        type: string

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Tectonic
        uses: wtfjoke/setup-tectonic@v4

      - name: Compile cover letter PDF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          node scripts/compile-cover-letter-pdf.mjs \
            --job-id "${{ inputs.job_id }}" \
            --out-dir artifacts/cover-letters

      - name: Sanitize artifact name
        id: artifact_name
        shell: bash
        run: |
          SAFE_NAME="$(printf '%s' "${{ inputs.job_id }}" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "value=cover-letter-${SAFE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.value }}
          path: artifacts/cover-letters/*.pdf
          if-no-files-found: error

      - name: Notify Telegram on workflow failure
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          TEXT="⚠️ Cover Letter PDF failed%0ARepo: ${{ github.repository }}%0AJob ID: ${{ inputs.job_id }}%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"

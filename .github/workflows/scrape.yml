name: Scrape Jobs

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
    inputs:
      force_fetch:
        description: Force-refresh all company sources and ignore scraper cache
        required: false
        type: boolean
        default: false
      rescore_all:
        description: Rescore all matched jobs instead of only new or changed jobs
        required: false
        type: boolean
        default: false
      company:
        description: Optional company id to limit the run
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: scrape-jobs
  cancel-in-progress: false

jobs:
  scrape-match-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync Python dependencies
        run: uv sync

      - name: Fetch jobs
        env:
          COMPANY_INPUT: ${{ inputs.company }}
          FORCE_FETCH: ${{ inputs.force_fetch }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${FORCE_FETCH:-false}" = "true" ]; then
            ARGS+=(--force)
          fi
          if [ -n "${COMPANY_INPUT:-}" ]; then
            ARGS+=(--company "$COMPANY_INPUT")
          fi
          uv run python fetch_jobs.py "${ARGS[@]}"

      - name: Match jobs
        env:
          COMPANY_INPUT: ${{ inputs.company }}
          RESCORE_ALL: ${{ inputs.rescore_all }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${RESCORE_ALL:-false}" = "true" ]; then
            ARGS+=(--rescore-all)
          fi
          if [ -n "${COMPANY_INPUT:-}" ]; then
            ARGS+=(--company "$COMPANY_INPUT")
          fi
          uv run python match_jobs.py "${ARGS[@]}"

      - name: Send Telegram alerts
        env:
          COMPANY_INPUT: ${{ inputs.company }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${COMPANY_INPUT:-}" ]; then
            ARGS+=(--company "$COMPANY_INPUT")
          fi
          uv run python notify.py "${ARGS[@]}"

      - name: Commit updated data files
        env:
          COMPANY_INPUT: ${{ inputs.company }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/source_health.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          if [ -n "${COMPANY_INPUT:-}" ]; then
            git commit -m "chore: refresh job data for ${COMPANY_INPUT} [skip ci]"
          else
            git commit -m "chore: refresh job data [skip ci]"
          fi
          git push

      - name: Notify Telegram on workflow failure
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMPANY_INPUT: ${{ inputs.company }}
        run: |
          set -euo pipefail
          COMPANY_SUFFIX=""
          if [ -n "${COMPANY_INPUT:-}" ]; then
            COMPANY_SUFFIX="\nCompany: ${COMPANY_INPUT}"
          fi
          TEXT="⚠️ Scrape Jobs failed%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}${COMPANY_SUFFIX}%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
